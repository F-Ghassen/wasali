# 07_booking_navigation_flow.yaml
# E2E flow: Test the complete booking navigation flow to ensure:
# 1. Search results → Booking creation works
# 2. After successful booking → Back button goes to Bookings list (not creation)
# 3. Clicking Bookings navbar icon from detail page → Goes to Bookings list
# 4. Clicking Bookings navbar icon from creation page → Cancels creation
#
# This test prevents regressions in the navigation stack management.
#
# Required env vars: SENDER_EMAIL, SENDER_PASSWORD

appId: host.exp.Exponent

---

# ─── SETUP ────────────────────────────────────────────────────────────────────
- launchApp:
    clearState: true

# 1. Navigate to Sign In
- tapOn:
    text: "Sign In"

# 2. Authenticate as sender
- runFlow:
    file: .maestro/_login_sender.yaml

# 3. Assert home screen
- assertVisible:
    text: "Send a package"

# ─── FLOW 1: Search → Booking Creation ────────────────────────────────────────
- tapOn:
    text: "FROM"
- assertVisible:
    text: "Select departure city"
- tapOn:
    text: "Berlin"

- tapOn:
    text: "TO"
- assertVisible:
    text: "Select destination city"
- tapOn:
    text: "Tunis"

- tapOn:
    text: "Search drivers"
- assertVisible:
    text: "Berlin → Tunis"

# Verify "Book slot" button exists
- assertVisible:
    text: "Book slot →"

# Tap first route card
- tapOn:
    text: "Book slot →"
    index: 0

# Assert we're in booking creation (Package details step)
- assertVisible:
    text: "Package details"

# ─── FLOW 2: Booking Navbar Icon → Cancels Creation ──────────────────────────
# Test that clicking Bookings icon from creation goes to bookings list
- tapOn:
    id: "bookings-tab"

# Should go back to bookings list (which is empty since we didn't complete booking)
- assertVisible:
    text: "No bookings yet"

# ─── FLOW 3: Complete a booking and test back navigation ──────────────────────
# Go back to search and book again
- tapOn:
    text: "Search Routes"

# Search again
- tapOn:
    text: "FROM"
- tapOn:
    text: "Berlin"

- tapOn:
    text: "TO"
- tapOn:
    text: "Tunis"

- tapOn:
    text: "Search drivers"

- tapOn:
    text: "Book slot →"
    index: 0

# Fill out booking
- assertVisible:
    text: "Package details"
- tapOn:
    id: "input-weight"
- clearText
- inputText:
    text: "3"
- tapOn:
    text: "General"
- tapOn:
    text: "Next"

# Logistics
- assertVisible:
    text: "Logistics"
- tapOn:
    text: "I'll drop off"
- tapOn:
    text: "Home delivery"
- tapOn:
    id: "input-dropoff-address"
- inputText:
    text: "5 Avenue Bourguiba, Tunis"
- tapOn:
    text: "Next"

# Recipient
- assertVisible:
    text: "Recipient"
- tapOn:
    id: "input-recipient-name"
- inputText:
    text: "Mohamed Test"
- tapOn:
    id: "input-recipient-phone"
- inputText:
    text: "22222222"
- tapOn:
    text: "Next"

# Confirm
- assertVisible:
    text: "Order summary"
- tapOn:
    text: "Confirm booking"

# Should arrive at booking detail with "Pending" status
- assertVisible:
    text: "Pending"

# ─── FLOW 4: Back Button from Detail → Bookings List ───────────────────────────
# Test that back button goes to bookings list, not creation
- tapOn:
    text: "‹"  # Back button

# Assert we're back at bookings list
- assertVisible:
    text: "My Bookings"

# Should show our newly created booking
- assertVisible:
    text: "Mohamed Test"

# ─── FLOW 5: Click Booking → Detail, Then Navbar Icon ──────────────────────────
# Click the first booking (should be our just-created one)
- tapOn:
    text: "Mohamed Test"
    index: 0

# Assert we're at detail (Pending status)
- assertVisible:
    text: "Pending"

# Click Bookings navbar icon while on detail page
- tapOn:
    id: "bookings-tab"

# Should stay on bookings list or go to it
- assertVisible:
    text: "My Bookings"

# ─── TEST COMPLETE ────────────────────────────────────────────────────────────
# All navigation flows verified without breaking the stack
